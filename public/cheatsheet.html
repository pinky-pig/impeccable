<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impeccable 命令速查表</title>
  <meta name="description" content="Impeccable 全部 17 个命令的快速参考。适合打印留存的 AI 设计命令速查表。">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-body: 'Instrument Sans', system-ui, sans-serif;
      --font-mono: 'Space Grotesk', monospace;
      --color-ink: #1a1a1a;
      --color-paper: #fafafa;
      --color-mist: #e5e5e5;
      --color-ash: #737373;
      --color-accent: #d946ef;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-ink: #fafafa;
        --color-paper: #1a1a1a;
        --color-mist: #333;
        --color-ash: #a3a3a3;
      }
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      font-family: var(--font-body);
      background: var(--color-paper);
      color: var(--color-ink);
      line-height: 1.5;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--color-mist);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--color-ash);
      font-size: 0.875rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--color-accent);
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .category {
      margin-bottom: 2rem;
    }

    .category-header {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-ash);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-mist);
    }

    .commands-grid {
      display: grid;
      gap: 0.75rem;
    }

    .command {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--color-mist);
    }

    .command:last-child {
      border-bottom: none;
    }

    .command-name {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--color-ink);
    }

    .command-desc {
      font-size: 0.875rem;
      color: var(--color-ink);
    }

    .command-meta {
      font-size: 0.75rem;
      color: var(--color-ash);
      margin-top: 0.25rem;
    }

    .command-meta code {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      background: var(--color-mist);
      padding: 1px 4px;
      border-radius: 2px;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--color-mist);
      font-size: 0.75rem;
      color: var(--color-ash);
      text-align: center;
    }

    footer a {
      color: var(--color-accent);
      text-decoration: none;
    }

    @media print {
      body { padding: 1rem; max-width: none; }
      .back-link { display: none; }
      footer { display: none; }
      .command { page-break-inside: avoid; }
    }

    @media (max-width: 600px) {
      .command {
        grid-template-columns: 1fr;
        gap: 0.25rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Impeccable 命令</h1>
    <p class="subtitle">17 个设计命令的快速参考</p>
    <a href="/" class="back-link">&larr; 返回首页</a>
  </header>

  <main id="commands-container">
    <p style="color: var(--color-ash);">正在加载命令……</p>
  </main>

  <footer>
    <p><a href="https://impeccable.style">impeccable.style</a> &middot; AI 编程工具设计命令中文版</p>
  </footer>

  <script type="module">
    const categoryLabels = {
      'diagnostic': '诊断',
      'quality': '质量',
      'intensity': '强度',
      'adaptation': '适配',
      'enhancement': '增强',
      'system': '系统'
    };

    const categoryOrder = ['diagnostic', 'quality', 'intensity', 'adaptation', 'enhancement', 'system'];

    const commandCategories = {
      'teach-impeccable': 'system',
      'audit': 'diagnostic',
      'critique': 'diagnostic',
      'normalize': 'quality',
      'polish': 'quality',
      'optimize': 'quality',
      'harden': 'quality',
      'clarify': 'adaptation',
      'quieter': 'intensity',
      'bolder': 'intensity',
      'distill': 'adaptation',
      'animate': 'enhancement',
      'colorize': 'enhancement',
      'delight': 'enhancement',
      'extract': 'system',
      'adapt': 'adaptation',
      'onboard': 'system'
    };

    const commandRelationships = {
      'teach-impeccable': { flow: '一次性收集项目设计上下文' },
      'audit': { leadsTo: ['normalize', 'harden', 'optimize', 'adapt', 'clarify'], flow: '技术质量审计' },
      'critique': { leadsTo: ['polish', 'distill', 'bolder', 'quieter'], flow: 'UX 与设计评审' },
      'normalize': { combinesWith: ['clarify', 'adapt'], flow: '对齐设计系统' },
      'polish': { flow: '上线前的最终润色' },
      'optimize': { flow: '性能优化' },
      'harden': { combinesWith: ['optimize'], flow: '错误处理与边界场景加固' },
      'clarify': { combinesWith: ['normalize', 'adapt'], flow: '改善 UX 文案' },
      'quieter': { pairs: 'bolder', flow: '降低设计攻击性' },
      'bolder': { pairs: 'quieter', flow: '增强设计冲击力' },
      'distill': { combinesWith: ['quieter', 'normalize'], flow: '提炼到本质' },
      'animate': { combinesWith: ['delight'], flow: '加入动效' },
      'colorize': { combinesWith: ['bolder', 'delight'], flow: '加入策略性色彩' },
      'delight': { combinesWith: ['bolder', 'animate'], flow: '加入个性与趣味' },
      'extract': { flow: '提取设计系统元素' },
      'adapt': { combinesWith: ['normalize', 'clarify'], flow: '适配不同设备与场景' },
      'onboard': { flow: '优化引导与空状态' }
    };

    async function loadCommands() {
      try {
        const response = await fetch('/api/commands');
        const commands = await response.json();

        // Group by category
        const grouped = {};
        commands.forEach(cmd => {
          const cat = commandCategories[cmd.id] || 'other';
          if (!grouped[cat]) grouped[cat] = [];
          grouped[cat].push(cmd);
        });

        // Render
        const container = document.getElementById('commands-container');
        let html = '';

        categoryOrder.forEach(cat => {
          if (grouped[cat] && grouped[cat].length > 0) {
            html += `<section class="category">
              <h2 class="category-header">${categoryLabels[cat]}</h2>
              <div class="commands-grid">`;

            grouped[cat].forEach(cmd => {
              const rel = commandRelationships[cmd.id];
              let metaHtml = '';

              if (rel) {
                if (rel.pairs) {
                  metaHtml = `可与 <code>/${rel.pairs}</code> 搭配`;
                } else if (rel.leadsTo) {
                  metaHtml = `后续可接 ${rel.leadsTo.map(c => `<code>/${c}</code>`).join(', ')}`;
                } else if (rel.combinesWith) {
                  metaHtml = `常与 ${rel.combinesWith.map(c => `<code>/${c}</code>`).join(', ')}`;
                }
              }

              html += `<div class="command">
                <div class="command-name">/${cmd.id}</div>
                <div class="command-info">
                  <div class="command-desc">${cmd.description}</div>
                  ${metaHtml ? `<div class="command-meta">${metaHtml}</div>` : ''}
                </div>
              </div>`;
            });

            html += `</div></section>`;
          }
        });

        container.innerHTML = html;
      } catch (error) {
        console.error('Error loading commands:', error);
        document.getElementById('commands-container').innerHTML =
          '<p style="color: red;">命令加载失败，请刷新页面重试。</p>';
      }
    }

    loadCommands();
  </script>
</body>
</html>
